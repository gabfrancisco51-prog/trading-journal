<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trading Journal | Mobile Calendar</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-dark: #0a0f1a;
    --card-bg: #141b2b;
    --border: #1f2a3e;
    --green: #00c853;
    --red: #ff3b30;
    --text-primary: #e8edf2;
    --text-secondary: #8a99b4;
    --accent: #2b7a62;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    padding: 10px;
  }

  .dashboard {
    max-width: 100%;
    margin: 0 auto 16px;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 14px;
    border: 1px solid var(--border);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .stat-card {
    background: rgba(10, 15, 26, 0.6);
    border-radius: 12px;
    padding: 8px 4px;
    text-align: center;
  }

  .stat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
  }

  .stat-value {
    font-size: 16px;
    font-weight: 700;
    font-family: monospace;
  }

  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .month-title {
    font-size: 18px;
    font-weight: 600;
  }

  .nav-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
  }

  /* CALENDAR - FULLY MOBILE RESPONSIVE */
  .calendar-container {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .calendar {
    min-width: 100%;
    width: 100%;
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: rgba(0,0,0,0.3);
    padding: 10px 0;
    text-align: center;
    font-weight: 600;
    font-size: 11px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 4px;
    cursor: pointer;
    background: rgba(20, 27, 43, 0.5);
    min-height: 70px;
  }

  .day-cell:active {
    background: rgba(43, 122, 98, 0.3);
  }

  .day-cell.empty {
    background: rgba(0,0,0,0.2);
    cursor: default;
  }

  /* Remove right border from last column */
  .day-cell:nth-child(7n) {
    border-right: none;
  }

  .day-number {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .day-pnl {
    font-weight: 700;
    font-size: 10px;
    white-space: nowrap;
    overflow-x: hidden;
    text-overflow: ellipsis;
  }

  .day-pnl.positive { color: var(--green); }
  .day-pnl.negative { color: var(--red); }

  .trade-count {
    font-size: 9px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  .modal.show {
    display: flex;
  }

  .modal-content {
    background: var(--card-bg);
    border-radius: 24px;
    max-width: 450px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 18px;
    border: 1px solid var(--accent);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .modal-header h2 {
    font-size: 18px;
  }

  .close-modal {
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    padding: 0 8px;
  }

  .trade-form {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .trade-form h4 {
    margin-bottom: 12px;
    font-size: 15px;
  }

  .form-row {
    margin-bottom: 10px;
  }

  .form-row input, 
  .form-row select {
    width: 100%;
    padding: 12px;
    background: #1a2333;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    margin-bottom: 8px;
  }

  .double-input {
    display: flex;
    gap: 8px;
  }

  .double-input input {
    flex: 1;
    margin-bottom: 0;
  }

  .add-trade-btn {
    background: var(--accent);
    border: none;
    padding: 14px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }

  .trades-list {
    max-height: 280px;
    overflow-y: auto;
  }

  .trade-item {
    background: #0f1622;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 8px;
    border-left: 3px solid var(--green);
  }

  .trade-item.loss {
    border-left-color: var(--red);
  }

  .trade-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 13px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .trade-details {
    font-size: 11px;
    color: var(--text-secondary);
    margin: 4px 0;
  }

  .trade-link {
    display: inline-block;
    margin-top: 6px;
    color: #d4af37;
    text-decoration: none;
    font-size: 10px;
    word-break: break-all;
  }

  .delete-trade {
    background: rgba(255,59,48,0.2);
    border: none;
    color: var(--red);
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
  }

  .day-total {
    margin-top: 16px;
    padding: 10px;
    background: #0a0f1a;
    border-radius: 12px;
    text-align: center;
    font-size: 13px;
    font-weight: bold;
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-bottom: 14px;
  }

  .action-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 11px;
  }

  /* DESKTOP IMPROVEMENTS */
  @media (min-width: 600px) {
    body { padding: 20px; }
    .dashboard { max-width: 700px; }
    .calendar-container { max-width: 700px; margin: 0 auto; }
    .stats-grid { gap: 12px; }
    .stat-value { font-size: 22px; }
    .day-cell { min-height: 85px; padding: 10px 6px; }
    .day-number { font-size: 13px; }
    .day-pnl { font-size: 12px; }
    .form-row { margin-bottom: 12px; }
  }

  /* TINY PHONES (under 400px) */
  @media (max-width: 400px) {
    body { padding: 6px; }
    .day-cell { padding: 6px 3px; min-height: 65px; }
    .day-number { font-size: 11px; }
    .day-pnl { font-size: 9px; }
    .stat-value { font-size: 14px; }
    .weekdays { font-size: 10px; padding: 8px 0; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="action-buttons">
    <button class="action-btn" id="exportBtn">📥 Export</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="action-btn" id="importBtn">📂 Import</button>
    <button class="action-btn" id="resetAllBtn" style="border-color:#8b2020;color:#ff3b30;">🗑️ Reset</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">← Prev</button>
    <h2 class="month-title" id="monthTitle">March 2026</h2>
    <button class="nav-btn" id="nextMonth">Next →</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total P&L</div><div class="stat-value" id="totalPnl">$0</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="winRate">0%</div></div>
    <div class="stat-card"><div class="stat-label">Trades</div><div class="stat-value" id="totalTrades">0</div></div>
    <div class="stat-card"><div class="stat-label">Winning Days</div><div class="stat-value" id="winningDays">0</div></div>
    <div class="stat-card"><div class="stat-label">Best Day</div><div class="stat-value positive" id="bestDay">$0</div></div>
    <div class="stat-card"><div class="stat-label">Worst Day</div><div class="stat-value negative" id="worstDay">$0</div></div>
  </div>
</div>

<div class="calendar-container">
  <div class="calendar">
    <div class="weekdays">
      <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
    </div>
    <div class="days-grid" id="calendarGrid"></div>
  </div>
</div>

<div id="dayModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalDate">Trades</h2>
      <button class="close-modal" id="closeModalBtn">×</button>
    </div>

    <div class="trade-form">
      <h4>➕ Add Trade</h4>
      <div class="form-row">
        <select id="tradePair">
          <optgroup label="📈 Forex"><option>EUR/USD</option><option>GBP/USD</option><option>AUD/USD</option><option>USD/JPY</option><option>USD/CAD</option><option>USD/CHF</option></optgroup>
          <optgroup label="🥇 Metals"><option>XAU/USD</option><option>XAG/USD</option></optgroup>
          <optgroup label="📊 Indices/Crypto"><option>NAS100</option><option>BTC/USD</option><option>ETH/USD</option></optgroup>
        </select>
      </div>
      <div class="form-row">
        <select id="tradeDirection">
          <option>📈 Long (Buy)</option>
          <option>📉 Short (Sell)</option>
        </select>
      </div>
      <div class="double-input">
        <input type="number" id="tradeSize" placeholder="Lot size" step="0.01">
        <input type="number" id="tradePnl" placeholder="P&L in $" step="any">
      </div>
      <div class="double-input">
        <input type="number" id="entryPrice" placeholder="Entry" step="any">
        <input type="number" id="exitPrice" placeholder="Exit" step="any">
      </div>
      <div class="form-row">
        <input type="text" id="tradeLink" placeholder="TradingView link (optional)">
      </div>
      <button class="add-trade-btn" id="addTradeBtn">+ Record Trade</button>
    </div>

    <h4>📋 Trades</h4>
    <div id="tradesList"></div>
    <div id="dayTotalDisplay" class="day-total"></div>
  </div>
</div>

<script>
  let journalData = {};
  let currentYear = 2026;
  let currentMonth = 2; // 0 = Jan, 2 = March

  function getDateKey(year, month, day) {
    let mm = (month + 1).toString().padStart(2, '0');
    let dd = day.toString().padStart(2, '0');
    return `${mm}${dd}${year}`;
  }

  function parseDateKey(dateKey) {
    if (!dateKey || dateKey.length !== 8) return null;
    let month = parseInt(dateKey.substring(0, 2)) - 1;
    let day = parseInt(dateKey.substring(2, 4));
    let year = parseInt(dateKey.substring(4, 8));
    return new Date(year, month, day);
  }

  function loadData() {
    let saved = localStorage.getItem('trading_journal');
    journalData = saved ? JSON.parse(saved) : {};
    renderCalendar();
    updateStats();
  }

  function saveData() {
    localStorage.setItem('trading_journal', JSON.stringify(journalData));
    renderCalendar();
    updateStats();
  }

  function getTradesForDate(dateKey) {
    return journalData[dateKey]?.trades || [];
  }

  function getDailyPnL(dateKey) {
    let trades = getTradesForDate(dateKey);
    return trades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
  }

  function renderCalendar() {
    const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
    const startWeekday = firstDayOfMonth.getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    
    // Empty cells
    for (let i = 0; i < startWeekday; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }
    
    // Actual days
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = getDateKey(currentYear, currentMonth, d);
      const dailyPnL = getDailyPnL(dateKey);
      const tradesCount = getTradesForDate(dateKey).length;
      
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.innerHTML = `
        <div class="day-number">${d}</div>
        <div class="day-pnl ${dailyPnL >= 0 ? 'positive' : 'negative'}">${dailyPnL >= 0 ? '+' : ''}$${dailyPnL.toFixed(2)}</div>
        ${tradesCount > 0 ? `<div class="trade-count">📊 ${tradesCount}</div>` : ''}
      `;
      cell.addEventListener('click', (function(key) {
        return function() { openModal(key); };
      })(dateKey));
      grid.appendChild(cell);
    }
    
    // Fill remaining to complete 6 rows
    const totalCells = startWeekday + daysInMonth;
    const remaining = 42 - totalCells;
    for (let i = 0; i < remaining; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }
    
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    document.getElementById('monthTitle').innerText = `${monthNames[currentMonth]} ${currentYear}`;
  }

  let currentModalDateKey = null;

  function openModal(dateKey) {
    currentModalDateKey = dateKey;
    const date = parseDateKey(dateKey);
    const formatted = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('modalDate').innerHTML = `📅 ${formatted}`;
    renderTradesForModal(dateKey);
    document.getElementById('dayModal').classList.add('show');
    
    document.getElementById('tradePair').value = 'EUR/USD';
    document.getElementById('tradeDirection').value = '📈 Long (Buy)';
    document.getElementById('tradeSize').value = '';
    document.getElementById('entryPrice').value = '';
    document.getElementById('exitPrice').value = '';
    document.getElementById('tradePnl').value = '';
    document.getElementById('tradeLink').value = '';
  }

  function renderTradesForModal(dateKey) {
    const trades = getTradesForDate(dateKey);
    const container = document.getElementById('tradesList');
    const totalPnL = getDailyPnL(dateKey);
    
    if (trades.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:30px;color:#8a99b4;">No trades yet</div>';
    } else {
      let html = '';
      trades.forEach((trade, idx) => {
        const pnlNum = parseFloat(trade.pnl) || 0;
        const isProfit = pnlNum >= 0;
        html += `
          <div class="trade-item ${isProfit ? '' : 'loss'}">
            <div class="trade-header">
              <strong>${trade.pair}</strong> <span>${trade.direction}</span>
              <button class="delete-trade" data-index="${idx}">Delete</button>
            </div>
            <div class="trade-details">Size: ${trade.size} | Entry: ${trade.entry} | Exit: ${trade.exit}</div>
            <div class="trade-details" style="color: ${isProfit ? '#00c853' : '#ff3b30'}">P&L: $${pnlNum.toFixed(2)}</div>
            ${trade.link ? `<a href="${trade.link}" target="_blank" class="trade-link">🔗 TradingView Chart</a>` : ''}
          </div>
        `;
      });
      container.innerHTML = html;
      
      document.querySelectorAll('.delete-trade').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(btn.getAttribute('data-index'));
          deleteTradeFromDay(dateKey, idx);
        });
      });
    }
    document.getElementById('dayTotalDisplay').innerHTML = `📊 Day Total: <span style="color:${totalPnL >= 0 ? '#00c853' : '#ff3b30'}">${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}</span> | ${trades.length} trade(s)`;
  }

  function deleteTradeFromDay(dateKey, tradeIndex) {
    if (!journalData[dateKey]) return;
    journalData[dateKey].trades.splice(tradeIndex, 1);
    if (journalData[dateKey].trades.length === 0) {
      delete journalData[dateKey];
    }
    saveData();
    if (currentModalDateKey === dateKey) renderTradesForModal(dateKey);
  }

  function addTradeToCurrentDay() {
    if (!currentModalDateKey) return;
    
    const pair = document.getElementById('tradePair').value;
    let direction = document.getElementById('tradeDirection').value;
    const size = parseFloat(document.getElementById('tradeSize').value) || 0;
    const entry = parseFloat(document.getElementById('entryPrice').value) || 0;
    const exit = parseFloat(document.getElementById('exitPrice').value) || 0;
    const pnl = parseFloat(document.getElementById('tradePnl').value);
    const link = document.getElementById('tradeLink').value.trim();
    
    if (isNaN(pnl)) {
      alert("Please enter a valid P&L amount");
      return;
    }
    
    const newTrade = {
      pair, direction, size, entry, exit, pnl, link,
      timestamp: Date.now()
    };
    
    if (!journalData[currentModalDateKey]) {
      journalData[currentModalDateKey] = { trades: [] };
    }
    journalData[currentModalDateKey].trades.push(newTrade);
    saveData();
    renderTradesForModal(currentModalDateKey);
  }

  function updateStats() {
    const monthlyTrades = [];
    const monthlyDays = new Set();
    
    for (const dateKey in journalData) {
      const date = parseDateKey(dateKey);
      if (date && date.getFullYear() === currentYear && date.getMonth() === currentMonth) {
        monthlyDays.add(dateKey);
        journalData[dateKey].trades.forEach(t => monthlyTrades.push(parseFloat(t.pnl) || 0));
      }
    }
    
    const totalPnl = monthlyTrades.reduce((a, b) => a + b, 0);
    const winningTrades = monthlyTrades.filter(p => p > 0).length;
    const totalTrades = monthlyTrades.length;
    const winRate = totalTrades === 0 ? 0 : (winningTrades / totalTrades) * 100;
    
    const dayPnls = [];
    for (const dateKey of monthlyDays) {
      dayPnls.push(getDailyPnL(dateKey));
    }
    const bestDay = dayPnls.length ? Math.max(...dayPnls) : 0;
    const worstDay = dayPnls.length ? Math.min(...dayPnls) : 0;
    
    const totalElem = document.getElementById('totalPnl');
    totalElem.innerHTML = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
    totalElem.className = `stat-value ${totalPnl >= 0 ? 'positive' : 'negative'}`;
    document.getElementById('winRate').innerHTML = `${winRate.toFixed(1)}%`;
    document.getElementById('totalTrades').innerHTML = totalTrades;
    document.getElementById('winningDays').innerHTML = monthlyDays.size;
    document.getElementById('bestDay').innerHTML = `+$${bestDay.toFixed(2)}`;
    document.getElementById('worstDay').innerHTML = `$${worstDay.toFixed(2)}`;
  }

  function prevMonth() {
    if (currentMonth === 0) {
      currentMonth = 11;
      currentYear--;
    } else {
      currentMonth--;
    }
    renderCalendar();
    updateStats();
  }

  function nextMonth() {
    if (currentMonth === 11) {
      currentMonth = 0;
      currentYear++;
    } else {
      currentMonth++;
    }
    renderCalendar();
    updateStats();
  }

  function exportData() {
    const dataStr = JSON.stringify(journalData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `trading_journal_${currentYear}_${currentMonth + 1}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        journalData = JSON.parse(e.target.result);
        saveData();
        alert('Import successful!');
      } catch (err) {
        alert('Invalid backup file');
      }
    };
    reader.readAsText(file);
  }

  function resetAll() {
    if (confirm('⚠️ DELETE ALL TRADING DATA? This cannot be undone.')) {
      journalData = {};
      saveData();
      if (document.getElementById('dayModal').classList.contains('show')) {
        document.getElementById('dayModal').classList.remove('show');
      }
    }
  }

  // Event listeners
  document.getElementById('prevMonth').addEventListener('click', prevMonth);
  document.getElementById('nextMonth').addEventListener('click', nextMonth);
  document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('dayModal').classList.remove('show'));
  document.getElementById('addTradeBtn').addEventListener('click', addTradeToCurrentDay);
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => {
    if (e.target.files[0]) importData(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('resetAllBtn').addEventListener('click', resetAll);
  window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('dayModal')) {
      document.getElementById('dayModal').classList.remove('show');
    }
  });

  loadData();
</script>
</body>
</html>
