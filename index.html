<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forex & Metals Trading Journal | Calendar Journal</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-dark: #0a0f1a;
    --card-bg: #141b2b;
    --border: #1f2a3e;
    --green: #00c853;
    --green-dim: #1b5e2a;
    --red: #ff3b30;
    --red-dim: #8b2020;
    --text-primary: #e8edf2;
    --text-secondary: #8a99b4;
    --accent: #2b7a62;
    --accent-gold: #d4af37;
    --modal-overlay: rgba(0,0,0,0.85);
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 20px 16px 40px;
  }

  .dashboard {
    max-width: 1400px;
    margin: 0 auto 24px;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px 24px;
    border: 1px solid var(--border);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }

  .stat-card {
    background: rgba(10, 15, 26, 0.6);
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'SF Mono', 'Courier New', monospace;
  }

  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  .month-title {
    font-size: 24px;
    font-weight: 600;
    font-family: Georgia, serif;
  }

  .nav-buttons {
    display: flex;
    gap: 12px;
  }

  .nav-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 8px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }

  .nav-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .calendar {
    max-width: 1400px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: rgba(0,0,0,0.3);
    padding: 12px 8px;
    text-align: center;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .day-cell {
    aspect-ratio: 1 / 0.9;
    min-height: 95px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px;
    cursor: pointer;
    transition: background 0.15s;
    background: rgba(20, 27, 43, 0.5);
    position: relative;
  }

  .day-cell:hover {
    background: rgba(43, 122, 98, 0.2);
  }

  .day-cell.empty {
    background: rgba(0,0,0,0.2);
    cursor: default;
  }

  .day-number {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .day-summary {
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .day-pnl {
    font-weight: 700;
    font-size: 13px;
  }

  .day-pnl.positive { color: var(--green); }
  .day-pnl.negative { color: var(--red); }

  .trade-count {
    font-size: 10px;
    color: var(--text-secondary);
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--modal-overlay);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(6px);
  }

  .modal.show {
    display: flex;
  }

  .modal-content {
    background: var(--card-bg);
    border-radius: 24px;
    max-width: 650px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    border: 1px solid var(--accent);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .modal-header h2 {
    font-size: 20px;
  }

  .close-modal {
    background: none;
    border: none;
    color: white;
    font-size: 26px;
    cursor: pointer;
    padding: 0 8px;
  }

  .trade-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  input, select {
    background: #1a2333;
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-family: inherit;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .add-trade-btn {
    background: var(--accent);
    border: none;
    padding: 12px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  .trades-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .trade-item {
    background: #0f1622;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 3px solid var(--green);
  }

  .trade-item.loss {
    border-left-color: var(--red);
  }

  .trade-header {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .trade-details {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 6px 0;
  }

  .trade-link {
    display: inline-block;
    margin-top: 6px;
    color: var(--accent-gold);
    text-decoration: none;
    font-size: 11px;
    word-break: break-all;
  }

  .delete-trade {
    background: rgba(255,59,48,0.2);
    border: none;
    color: var(--red);
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
  }

  .day-total {
    margin-top: 16px;
    padding: 12px;
    background: #0a0f1a;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
  }

  .export-import {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
  }

  .reset-btn {
    border-color: var(--red-dim);
    color: var(--red);
  }

  @media (max-width: 700px) {
    .day-cell { padding: 4px; min-height: 70px; }
    .day-number { font-size: 10px; }
    .day-pnl { font-size: 10px; }
    .stat-value { font-size: 20px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="export-import">
    <button class="action-btn" id="exportBtn">📥 Export Backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="action-btn" id="importBtn">📂 Import Backup</button>
    <button class="action-btn reset-btn" id="resetAllBtn">⚠️ Reset All Data</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">← Previous</button>
    <h2 class="month-title" id="monthTitle">March 2026</h2>
    <button class="nav-btn" id="nextMonth">Next →</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total P&L (Month)</div><div class="stat-value" id="totalPnl">$0</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="winRate">0%</div></div>
    <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-value" id="totalTrades">0</div></div>
    <div class="stat-card"><div class="stat-label">Winning Days</div><div class="stat-value" id="winningDays">0</div></div>
    <div class="stat-card"><div class="stat-label">Best Day</div><div class="stat-value positive" id="bestDay">$0</div></div>
    <div class="stat-card"><div class="stat-label">Worst Day</div><div class="stat-value negative" id="worstDay">$0</div></div>
  </div>
</div>

<div class="calendar">
  <div class="weekdays">
    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
  </div>
  <div class="days-grid" id="calendarGrid"></div>
</div>

<div id="dayModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalDate">Trades for </h2>
      <button class="close-modal" id="closeModalBtn">×</button>
    </div>

    <div class="trade-form">
      <h4>➕ Add New Trade</h4>
      <div class="form-row">
        <select id="tradePair">
          <!-- Forex USD Pairs -->
          <optgroup label="📈 Forex (USD Pairs)">
            <option value="EUR/USD">EUR/USD - Euro</option>
            <option value="GBP/USD">GBP/USD - British Pound</option>
            <option value="AUD/USD">AUD/USD - Australian Dollar</option>
            <option value="NZD/USD">NZD/USD - New Zealand Dollar</option>
            <option value="USD/JPY">USD/JPY - Japanese Yen</option>
            <option value="USD/CAD">USD/CAD - Canadian Dollar</option>
            <option value="USD/CHF">USD/CHF - Swiss Franc</option>
          </optgroup>
          <optgroup label="🥇 Metals & Commodities">
            <option value="XAU/USD">XAU/USD - Gold</option>
            <option value="XAG/USD">XAG/USD - Silver</option>
          </optgroup>
          <optgroup label="📊 Indices & Crypto">
            <option value="NAS100">NASDAQ 100 (US100)</option>
            <option value="BTC/USD">BTC/USD - Bitcoin</option>
            <option value="ETH/USD">ETH/USD - Ethereum</option>
          </optgroup>
        </select>
        <select id="tradeDirection">
          <option value="Long">📈 Long (Buy)</option>
          <option value="Short">📉 Short (Sell)</option>
        </select>
      </div>
      <div class="form-row">
        <input type="number" id="tradeSize" placeholder="Lot size / Units" step="0.01" value="0.1">
        <input type="number" id="entryPrice" placeholder="Entry price" step="any">
        <input type="number" id="exitPrice" placeholder="Exit price" step="any">
      </div>
      <div class="form-row">
        <input type="number" id="tradePnl" placeholder="P&L in $" step="any">
        <input type="text" id="tradeLink" placeholder="TradingView link (optional)">
      </div>
      <button class="add-trade-btn" id="addTradeBtn">+ Record Trade</button>
    </div>

    <h4>📋 Trades for this day</h4>
    <div id="tradesList" class="trades-list"></div>
    <div id="dayTotalDisplay" class="day-total"></div>
  </div>
</div>

<script>
  let journalData = {};
  let currentYear = 2026;
  let currentMonth = 2; // March 2026 (0-indexed)

  function getDateKey(date) {
    let month = (date.getMonth() + 1).toString().padStart(2,'0');
    let day = date.getDate().toString().padStart(2,'0');
    let year = date.getFullYear();
    return `${month}${day}${year}`;
  }

  function parseDateKey(dateKey) {
    if(!dateKey || dateKey.length !== 8) return null;
    let month = parseInt(dateKey.substring(0,2)) - 1;
    let day = parseInt(dateKey.substring(2,4));
    let year = parseInt(dateKey.substring(4,8));
    return new Date(year, month, day);
  }

  function loadData() {
    let saved = localStorage.getItem('forex_trading_journal');
    if(saved) {
      journalData = JSON.parse(saved);
    } else {
      journalData = {};
    }
    renderCalendar();
    updateStats();
  }

  function saveData() {
    localStorage.setItem('forex_trading_journal', JSON.stringify(journalData));
    renderCalendar();
    updateStats();
  }

  function getTradesForDate(dateKey) {
    return journalData[dateKey]?.trades || [];
  }

  function getDailyPnL(dateKey) {
    let trades = getTradesForDate(dateKey);
    let total = trades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
    return total;
  }

  function renderCalendar() {
    let firstDay = new Date(currentYear, currentMonth, 1);
    let lastDay = new Date(currentYear, currentMonth + 1, 0);
    let startWeekday = firstDay.getDay();
    let daysInMonth = lastDay.getDate();

    let grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    for(let i = 0; i < startWeekday; i++) {
      let empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for(let d = 1; d <= daysInMonth; d++) {
      let dateObj = new Date(currentYear, currentMonth, d);
      let dateKey = getDateKey(dateObj);
      let dailyPnL = getDailyPnL(dateKey);
      let tradesCount = getTradesForDate(dateKey).length;
      
      let cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.innerHTML = `
        <div class="day-number">${d}</div>
        <div class="day-summary">
          <div class="day-pnl ${dailyPnL >= 0 ? 'positive' : 'negative'}">${dailyPnL >= 0 ? '+' : ''}$${dailyPnL.toFixed(2)}</div>
          ${tradesCount > 0 ? `<div class="trade-count">📊 ${tradesCount} trade${tradesCount > 1 ? 's' : ''}</div>` : '<div class="trade-count">—</div>'}
        </div>
      `;
      cell.addEventListener('click', (function(key) { return function() { openModal(key); }; })(dateKey));
      grid.appendChild(cell);
    }

    let totalCells = startWeekday + daysInMonth;
    let remaining = 42 - totalCells;
    for(let i = 0; i < remaining; i++) {
      let empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    document.getElementById('monthTitle').innerText = new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long', year: 'numeric' });
  }

  let currentModalDateKey = null;

  function openModal(dateKey) {
    currentModalDateKey = dateKey;
    let dateObj = parseDateKey(dateKey);
    let formatted = dateObj ? dateObj.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : dateKey;
    document.getElementById('modalDate').innerHTML = `📅 ${formatted}`;
    renderTradesForModal(dateKey);
    document.getElementById('dayModal').classList.add('show');
    
    document.getElementById('tradePair').value = 'EUR/USD';
    document.getElementById('tradeDirection').value = 'Long';
    document.getElementById('tradeSize').value = '0.1';
    document.getElementById('entryPrice').value = '';
    document.getElementById('exitPrice').value = '';
    document.getElementById('tradePnl').value = '';
    document.getElementById('tradeLink').value = '';
  }

  function renderTradesForModal(dateKey) {
    const trades = getTradesForDate(dateKey);
    const container = document.getElementById('tradesList');
    const totalPnL = getDailyPnL(dateKey);
    
    if(trades.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:30px;color:#8a99b4;">No trades recorded yet. Add your first trade above.</div>';
    } else {
      let html = '';
      trades.forEach((trade, idx) => {
        let pnlNum = parseFloat(trade.pnl) || 0;
        let isProfit = pnlNum >= 0;
        let pairDisplay = trade.pair;
        html += `
          <div class="trade-item ${isProfit ? '' : 'loss'}">
            <div class="trade-header">
              <strong>${pairDisplay}</strong> <span>${trade.direction}</span>
              <button class="delete-trade" data-index="${idx}">Delete</button>
            </div>
            <div class="trade-details">Size: ${trade.size} | Entry: ${trade.entry} | Exit: ${trade.exit}</div>
            <div class="trade-details" style="color: ${isProfit ? '#00c853' : '#ff3b30'}; font-weight:bold;">P&L: $${pnlNum.toFixed(2)}</div>
            ${trade.link ? `<a href="${trade.link}" target="_blank" class="trade-link">🔗 TradingView Chart →</a>` : ''}
          </div>
        `;
      });
      container.innerHTML = html;
      document.querySelectorAll('.delete-trade').forEach(btn => {
        btn.addEventListener('click', (e) => {
          let idx = parseInt(btn.getAttribute('data-index'));
          deleteTradeFromDay(dateKey, idx);
        });
      });
    }
    document.getElementById('dayTotalDisplay').innerHTML = `📊 Day Total P&L: <span style="color:${totalPnL >=0 ? '#00c853' : '#ff3b30'}">${totalPnL >=0 ? '+' : ''}$${totalPnL.toFixed(2)}</span> | ${trades.length} trade(s)`;
  }

  function deleteTradeFromDay(dateKey, tradeIndex) {
    if(!journalData[dateKey]) return;
    journalData[dateKey].trades.splice(tradeIndex, 1);
    if(journalData[dateKey].trades.length === 0) {
      delete journalData[dateKey];
    }
    saveData();
    if(currentModalDateKey === dateKey) renderTradesForModal(dateKey);
  }

  function addTradeToCurrentDay() {
    if(!currentModalDateKey) return;
    let pair = document.getElementById('tradePair').value;
    let direction = document.getElementById('tradeDirection').value;
    let size = parseFloat(document.getElementById('tradeSize').value) || 0;
    let entry = parseFloat(document.getElementById('entryPrice').value) || 0;
    let exit = parseFloat(document.getElementById('exitPrice').value) || 0;
    let pnl = parseFloat(document.getElementById('tradePnl').value);
    let link = document.getElementById('tradeLink').value.trim();

    if(isNaN(pnl)) {
      alert("Please enter a valid P&L amount");
      return;
    }

    let newTrade = {
      pair: pair,
      direction: direction,
      size: size,
      entry: entry,
      exit: exit,
      pnl: pnl,
      link: link || "",
      timestamp: Date.now()
    };

    if(!journalData[currentModalDateKey]) {
      journalData[currentModalDateKey] = { trades: [] };
    }
    journalData[currentModalDateKey].trades.push(newTrade);
    saveData();
    renderTradesForModal(currentModalDateKey);
  }

  function updateStats() {
    let monthlyTrades = [];
    let monthlyDays = new Set();
    for(let dateKey in journalData) {
      let date = parseDateKey(dateKey);
      if(date && date.getFullYear() === currentYear && date.getMonth() === currentMonth) {
        monthlyDays.add(dateKey);
        let trades = journalData[dateKey].trades;
        trades.forEach(t => monthlyTrades.push(parseFloat(t.pnl) || 0));
      }
    }
    let totalPnl = monthlyTrades.reduce((a,b) => a+b, 0);
    let winningTrades = monthlyTrades.filter(p => p > 0).length;
    let totalTrades = monthlyTrades.length;
    let winRate = totalTrades === 0 ? 0 : (winningTrades / totalTrades) * 100;
    
    let dayPnls = [];
    for(let dateKey of monthlyDays) {
      dayPnls.push(getDailyPnL(dateKey));
    }
    let winningDays = dayPnls.filter(p => p > 0).length;
    let bestDay = dayPnls.length ? Math.max(...dayPnls) : 0;
    let worstDay = dayPnls.length ? Math.min(...dayPnls) : 0;

    let totalElem = document.getElementById('totalPnl');
    totalElem.innerHTML = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
    totalElem.className = `stat-value ${totalPnl >= 0 ? 'positive' : 'negative'}`;
    document.getElementById('winRate').innerHTML = `${winRate.toFixed(1)}%`;
    document.getElementById('totalTrades').innerHTML = totalTrades;
    document.getElementById('winningDays').innerHTML = winningDays;
    document.getElementById('bestDay').innerHTML = `+$${bestDay.toFixed(2)}`;
    document.getElementById('worstDay').innerHTML = `$${worstDay.toFixed(2)}`;
  }

  function prevMonth() {
    if(currentMonth === 0) {
      currentMonth = 11;
      currentYear--;
    } else {
      currentMonth--;
    }
    renderCalendar();
    updateStats();
  }

  function nextMonth() {
    if(currentMonth === 11) {
      currentMonth = 0;
      currentYear++;
    } else {
      currentMonth++;
    }
    renderCalendar();
    updateStats();
  }

  function exportData() {
    let dataStr = JSON.stringify(journalData, null, 2);
    let blob = new Blob([dataStr], {type: 'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `trading_journal_${currentYear}_${currentMonth+1}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    let reader = new FileReader();
    reader.onload = (e) => {
      try {
        let imported = JSON.parse(e.target.result);
        journalData = imported;
        saveData();
        alert('Import successful!');
      } catch(err) { alert('Invalid backup file'); }
    };
    reader.readAsText(file);
  }

  function resetAll() {
    if(confirm('⚠️ WARNING: This will delete ALL trading data. Are you sure?')) {
      journalData = {};
      saveData();
      if(document.getElementById('dayModal').classList.contains('show')) document.getElementById('dayModal').classList.remove('show');
    }
  }

  document.getElementById('prevMonth').addEventListener('click', prevMonth);
  document.getElementById('nextMonth').addEventListener('click', nextMonth);
  document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('dayModal').classList.remove('show'));
  document.getElementById('addTradeBtn').addEventListener('click', addTradeToCurrentDay);
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
  document.getElementById('resetAllBtn').addEventListener('click', resetAll);
  window.addEventListener('click', (e) => { if(e.target === document.getElementById('dayModal')) document.getElementById('dayModal').classList.remove('show'); });

  loadData();
</script>
</body>
</html>
