<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forex & Metals Trading Journal | Calendar Journal</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-dark: #0a0f1a;
    --card-bg: #141b2b;
    --border: #1f2a3e;
    --green: #00c853;
    --red: #ff3b30;
    --text-primary: #e8edf2;
    --text-secondary: #8a99b4;
    --accent: #2b7a62;
    --accent-gold: #d4af37;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 12px;
  }

  .dashboard {
    max-width: 1200px;
    margin: 0 auto 20px;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 16px 20px;
    border: 1px solid var(--border);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 14px;
  }

  .stat-card {
    background: rgba(10, 15, 26, 0.6);
    border-radius: 12px;
    padding: 8px 6px;
    text-align: center;
  }

  .stat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 700;
    font-family: 'SF Mono', monospace;
  }

  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .month-title {
    font-size: 20px;
    font-weight: 600;
    font-family: Georgia, serif;
  }

  .nav-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 13px;
  }

  .calendar {
    max-width: 1200px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: rgba(0,0,0,0.3);
    padding: 10px 4px;
    text-align: center;
    font-weight: 600;
    font-size: 11px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px 4px;
    cursor: pointer;
    background: rgba(20, 27, 43, 0.5);
    min-height: 70px;
  }

  .day-cell:active {
    background: rgba(43, 122, 98, 0.3);
  }

  .day-cell.empty {
    background: rgba(0,0,0,0.2);
    cursor: default;
  }

  .day-number {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .day-pnl {
    font-weight: 700;
    font-size: 11px;
    white-space: nowrap;
    overflow-x: hidden;
    text-overflow: ellipsis;
  }

  .day-pnl.positive { color: var(--green); }
  .day-pnl.negative { color: var(--red); }

  .trade-count {
    font-size: 9px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  .modal.show {
    display: flex;
  }

  .modal-content {
    background: var(--card-bg);
    border-radius: 24px;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    border: 1px solid var(--accent);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .modal-header h2 {
    font-size: 18px;
  }

  .close-modal {
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    padding: 0 8px;
  }

  .trade-form {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 10px;
  }

  input, select {
    background: #1a2333;
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
  }

  .add-trade-btn {
    background: var(--accent);
    border: none;
    padding: 14px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }

  .trades-list {
    max-height: 280px;
    overflow-y: auto;
  }

  .trade-item {
    background: #0f1622;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 3px solid var(--green);
  }

  .trade-item.loss {
    border-left-color: var(--red);
  }

  .trade-header {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .trade-details {
    font-size: 11px;
    color: var(--text-secondary);
    margin: 4px 0;
  }

  .trade-link {
    display: inline-block;
    margin-top: 6px;
    color: var(--accent-gold);
    text-decoration: none;
    font-size: 10px;
    word-break: break-all;
  }

  .delete-trade {
    background: rgba(255,59,48,0.2);
    border: none;
    color: var(--red);
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
  }

  .day-total {
    margin-top: 16px;
    padding: 12px;
    background: #0a0f1a;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
  }

  .export-import {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 20px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 11px;
  }

  .reset-btn {
    border-color: #8b2020;
    color: var(--red);
  }

  /* Desktop improvements */
  @media (min-width: 768px) {
    body { padding: 20px; }
    .stats-grid { grid-template-columns: repeat(6, 1fr); gap: 16px; }
    .stat-card { padding: 12px; }
    .stat-value { font-size: 24px; }
    .stat-label { font-size: 10px; }
    .day-cell { padding: 8px; min-height: 85px; }
    .day-number { font-size: 13px; }
    .day-pnl { font-size: 13px; }
    .form-row { flex-direction: row; gap: 12px; }
    .form-row input, .form-row select { width: auto; flex: 1; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="export-import">
    <button class="action-btn" id="exportBtn">📥 Export</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="action-btn" id="importBtn">📂 Import</button>
    <button class="action-btn reset-btn" id="resetAllBtn">🗑️ Reset</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">← Prev</button>
    <h2 class="month-title" id="monthTitle">March 2026</h2>
    <button class="nav-btn" id="nextMonth">Next →</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total P&L</div><div class="stat-value" id="totalPnl">$0</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="winRate">0%</div></div>
    <div class="stat-card"><div class="stat-label">Trades</div><div class="stat-value" id="totalTrades">0</div></div>
    <div class="stat-card"><div class="stat-label">Winning Days</div><div class="stat-value" id="winningDays">0</div></div>
    <div class="stat-card"><div class="stat-label">Best Day</div><div class="stat-value positive" id="bestDay">$0</div></div>
    <div class="stat-card"><div class="stat-label">Worst Day</div><div class="stat-value negative" id="worstDay">$0</div></div>
  </div>
</div>

<div class="calendar">
  <div class="weekdays">
    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
  </div>
  <div class="days-grid" id="calendarGrid"></div>
</div>

<!-- MODAL -->
<div id="dayModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalDate">Trades</h2>
      <button class="close-modal" id="closeModalBtn">×</button>
    </div>

    <div class="trade-form">
      <h4>➕ Add Trade</h4>
      <div class="form-row">
        <select id="tradePair">
          <optgroup label="Forex">
            <option>EUR/USD</option><option>GBP/USD</option><option>AUD/USD</option>
            <option>USD/JPY</option><option>USD/CAD</option><option>USD/CHF</option>
          </optgroup>
          <optgroup label="Metals">
            <option>XAU/USD</option><option>XAG/USD</option>
          </optgroup>
          <optgroup label="Indices & Crypto">
            <option>NAS100</option><option>BTC/USD</option><option>ETH/USD</option>
          </optgroup>
        </select>
        <select id="tradeDirection">
          <option>Long (Buy)</option>
          <option>Short (Sell)</option>
        </select>
      </div>
      <div class="form-row">
        <input type="number" id="tradeSize" placeholder="Lot size" step="0.01">
        <input type="number" id="entryPrice" placeholder="Entry" step="any">
        <input type="number" id="exitPrice" placeholder="Exit" step="any">
      </div>
      <div class="form-row">
        <input type="number" id="tradePnl" placeholder="P&L in $" step="any">
        <input type="text" id="tradeLink" placeholder="TradingView link">
      </div>
      <button class="add-trade-btn" id="addTradeBtn">+ Record Trade</button>
    </div>

    <h4>📋 Trades</h4>
    <div id="tradesList"></div>
    <div id="dayTotalDisplay" class="day-total"></div>
  </div>
</div>

<script>
  let journalData = {};
  let currentYear = 2026;
  let currentMonth = 2; // March (0 = Jan)

  function getDateKey(date) {
    let month = (date.getMonth() + 1).toString().padStart(2,'0');
    let day = date.getDate().toString().padStart(2,'0');
    let year = date.getFullYear();
    return `${month}${day}${year}`;
  }

  function parseDateKey(dateKey) {
    if(!dateKey || dateKey.length !== 8) return null;
    let month = parseInt(dateKey.substring(0,2)) - 1;
    let day = parseInt(dateKey.substring(2,4));
    let year = parseInt(dateKey.substring(4,8));
    return new Date(year, month, day);
  }

  function loadData() {
    let saved = localStorage.getItem('forex_trading_journal');
    journalData = saved ? JSON.parse(saved) : {};
    renderCalendar();
    updateStats();
  }

  function saveData() {
    localStorage.setItem('forex_trading_journal', JSON.stringify(journalData));
    renderCalendar();
    updateStats();
  }

  function getTradesForDate(dateKey) {
    return journalData[dateKey]?.trades || [];
  }

  function getDailyPnL(dateKey) {
    let trades = getTradesForDate(dateKey);
    return trades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
  }

  function renderCalendar() {
    let firstDay = new Date(currentYear, currentMonth, 1);
    let lastDay = new Date(currentYear, currentMonth + 1, 0);
    let startWeekday = firstDay.getDay();
    let daysInMonth = lastDay.getDate();

    let grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    // Empty cells before month starts
    for(let i = 0; i < startWeekday; i++) {
      let empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    // Actual days
    for(let d = 1; d <= daysInMonth; d++) {
      let dateObj = new Date(currentYear, currentMonth, d);
      let dateKey = getDateKey(dateObj);
      let dailyPnL = getDailyPnL(dateKey);
      let tradesCount = getTradesForDate(dateKey).length;
      
      let cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.innerHTML = `
        <div class="day-number">${d}</div>
        <div class="day-pnl ${dailyPnL >= 0 ? 'positive' : 'negative'}">${dailyPnL >= 0 ? '+' : ''}$${dailyPnL.toFixed(2)}</div>
        ${tradesCount > 0 ? `<div class="trade-count">📊 ${tradesCount}</div>` : ''}
      `;
      cell.addEventListener('click', (function(key) { 
        return function() { openModal(key); }; 
      })(dateKey));
      grid.appendChild(cell);
    }

    // Fill remaining cells to complete the grid (always 6 rows = 42 cells)
    let totalCells = startWeekday + daysInMonth;
    let remaining = 42 - totalCells;
    for(let i = 0; i < remaining; i++) {
      let empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    document.getElementById('monthTitle').innerText = new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long', year: 'numeric' });
  }

  let currentModalDateKey = null;

  function openModal(dateKey) {
    currentModalDateKey = dateKey;
    let dateObj = parseDateKey(dateKey);
    let formatted = dateObj ? dateObj.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : dateKey;
    document.getElementById('modalDate').innerHTML = `📅 ${formatted}`;
    renderTradesForModal(dateKey);
    document.getElementById('dayModal').classList.add('show');
    
    // Reset form
    document.getElementById('tradePair').value = 'EUR/USD';
    document.getElementById('tradeDirection').value = 'Long (Buy)';
    document.getElementById('tradeSize').value = '';
    document.getElementById('entryPrice').value = '';
    document.getElementById('exitPrice').value = '';
    document.getElementById('tradePnl').value = '';
    document.getElementById('tradeLink').value = '';
  }

  function renderTradesForModal(dateKey) {
    const trades = getTradesForDate(dateKey);
    const container = document.getElementById('tradesList');
    const totalPnL = getDailyPnL(dateKey);
    
    if(trades.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:30px;color:#8a99b4;">No trades yet</div>';
    } else {
      let html = '';
      trades.forEach((trade, idx) => {
        let pnlNum = parseFloat(trade.pnl) || 0;
        let isProfit = pnlNum >= 0;
        html += `
          <div class="trade-item ${isProfit ? '' : 'loss'}">
            <div class="trade-header">
              <strong>${trade.pair}</strong> <span>${trade.direction}</span>
              <button class="delete-trade" data-index="${idx}">Delete</button>
            </div>
            <div class="trade-details">Size: ${trade.size} | Entry: ${trade.entry} | Exit: ${trade.exit}</div>
            <div class="trade-details" style="color: ${isProfit ? '#00c853' : '#ff3b30'}">P&L: $${pnlNum.toFixed(2)}</div>
            ${trade.link ? `<a href="${trade.link}" target="_blank" class="trade-link">🔗 TradingView</a>` : ''}
          </div>
        `;
      });
      container.innerHTML = html;
      document.querySelectorAll('.delete-trade').forEach(btn => {
        btn.addEventListener('click', (e) => {
          let idx = parseInt(btn.getAttribute('data-index'));
          deleteTradeFromDay(dateKey, idx);
        });
      });
    }
    document.getElementById('dayTotalDisplay').innerHTML = `Day Total: <span style="color:${totalPnL >=0 ? '#00c853' : '#ff3b30'}">${totalPnL >=0 ? '+' : ''}$${totalPnL.toFixed(2)}</span> | ${trades.length} trade(s)`;
  }

  function deleteTradeFromDay(dateKey, tradeIndex) {
    if(!journalData[dateKey]) return;
    journalData[dateKey].trades.splice(tradeIndex, 1);
    if(journalData[dateKey].trades.length === 0) {
      delete journalData[dateKey];
    }
    saveData();
    if(currentModalDateKey === dateKey) renderTradesForModal(dateKey);
  }

  function addTradeToCurrentDay() {
    if(!currentModalDateKey) return;
    let pair = document.getElementById('tradePair').value;
    let direction = document.getElementById('tradeDirection').value;
    let size = parseFloat(document.getElementById('tradeSize').value) || 0;
    let entry = parseFloat(document.getElementById('entryPrice').value) || 0;
    let exit = parseFloat(document.getElementById('exitPrice').value) || 0;
    let pnl = parseFloat(document.getElementById('tradePnl').value);
    let link = document.getElementById('tradeLink').value.trim();

    if(isNaN(pnl)) {
      alert("Enter valid P&L amount");
      return;
    }

    let newTrade = {
      pair: pair,
      direction: direction,
      size: size,
      entry: entry,
      exit: exit,
      pnl: pnl,
      link: link || "",
      timestamp: Date.now()
    };

    if(!journalData[currentModalDateKey]) {
      journalData[currentModalDateKey] = { trades: [] };
    }
    journalData[currentModalDateKey].trades.push(newTrade);
    saveData();
    renderTradesForModal(currentModalDateKey);
  }

  function updateStats() {
    let monthlyTrades = [];
    let monthlyDays = new Set();
    
    for(let dateKey in journalData) {
      let date = parseDateKey(dateKey);
      if(date && date.getFullYear() === currentYear && date.getMonth() === currentMonth) {
        monthlyDays.add(dateKey);
        journalData[dateKey].trades.forEach(t => monthlyTrades.push(parseFloat(t.pnl) || 0));
      }
    }
    
    let totalPnl = monthlyTrades.reduce((a,b) => a+b, 0);
    let winningTrades = monthlyTrades.filter(p => p > 0).length;
    let totalTrades = monthlyTrades.length;
    let winRate = totalTrades === 0 ? 0 : (winningTrades / totalTrades) * 100;
    
    let dayPnls = [];
    for(let dateKey of monthlyDays) {
      dayPnls.push(getDailyPnL(dateKey));
    }
    let bestDay = dayPnls.length ? Math.max(...dayPnls) : 0;
    let worstDay = dayPnls.length ? Math.min(...dayPnls) : 0;

    let totalElem = document.getElementById('totalPnl');
    totalElem.innerHTML = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
    totalElem.className = `stat-value ${totalPnl >= 0 ? 'positive' : 'negative'}`;
    document.getElementById('winRate').innerHTML = `${winRate.toFixed(1)}%`;
    document.getElementById('totalTrades').innerHTML = totalTrades;
    document.getElementById('winningDays').innerHTML = monthlyDays.size;
    document.getElementById('bestDay').innerHTML = `+$${bestDay.toFixed(2)}`;
    document.getElementById('worstDay').innerHTML = `$${worstDay.toFixed(2)}`;
  }

  function prevMonth() {
    if(currentMonth === 0) {
      currentMonth = 11;
      currentYear--;
    } else {
      currentMonth--;
    }
    renderCalendar();
    updateStats();
  }

  function nextMonth() {
    if(currentMonth === 11) {
      currentMonth = 0;
      currentYear++;
    } else {
      currentMonth++;
    }
    renderCalendar();
    updateStats();
  }

  function exportData() {
    let dataStr = JSON.stringify(journalData, null, 2);
    let blob = new Blob([dataStr], {type: 'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `trading_journal_${currentYear}_${currentMonth+1}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    let reader = new FileReader();
    reader.onload = (e) => {
      try {
        journalData = JSON.parse(e.target.result);
        saveData();
        alert('Import successful!');
      } catch(err) { alert('Invalid file'); }
    };
    reader.readAsText(file);
  }

  function resetAll() {
    if(confirm('Delete ALL trading data? This cannot be undone.')) {
      journalData = {};
      saveData();
      if(document.getElementById('dayModal').classList.contains('show')) {
        document.getElementById('dayModal').classList.remove('show');
      }
    }
  }

  // Event listeners
  document.getElementById('prevMonth').addEventListener('click', prevMonth);
  document.getElementById('nextMonth').addEventListener('click', nextMonth);
  document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('dayModal').classList.remove('show'));
  document.getElementById('addTradeBtn').addEventListener('click', addTradeToCurrentDay);
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
  document.getElementById('resetAllBtn').addEventListener('click', resetAll);
  window.addEventListener('click', (e) => { if(e.target === document.getElementById('dayModal')) document.getElementById('dayModal').classList.remove('show'); });

  loadData();
</script>
</body>
</html>
